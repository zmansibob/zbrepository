<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZB Voice Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: #eee;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #2d2d2d;
            padding: 25px;
            border-radius: 16px;
        }

        h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        #viewer {
            height: 400px; /* Slightly taller for better context */
            background: #0d0d0d; /* Deeper black for higher contrast */
            overflow-y: auto;
            padding: 30px; /* More breathing room */
            border-radius: 12px;
            font-size: 18px; /* Slightly larger for easier reading */
            margin: 15px 0;
            border: 1px solid #333;
            line-height: 2.2; /* Key for tracking the highlight */
            color: #999; /* Softer grey for non-active text */
            scroll-behavior: smooth;
        }

        /* Sentence Highlighting */
        .sent {
            cursor: pointer;
            transition: all 0.25s ease;
            padding: 2px 6px;
            border-radius: 6px;
            display: inline; /* Keeps sentences flowing like a paragraph */
        }

        .sent:hover {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
        }

        .sent.active {
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.12);
            font-weight: 600;
            /* Adds a subtle "focus" indicator on the left */
            box-shadow: -4px 0 0 #00d4ff;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .audio-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #play-btn {
            background: #007bff;
            color: white;
            flex: 2;
        }

        #stop-btn {
            background: #ff3b30;
            color: white;
            flex: 1;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #bbb;
        }

        #status {
            font-size: 12px;
            text-align: center;
            color: #00d4ff;
            margin-top: 10px;
            min-height: 1.2em;
        }

        .switch {
            position: relative;
            width: 40px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: #555;
            border-radius: 22px;
            cursor: pointer;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: #00d4ff;
        }

        input:checked + .slider:before {
            transform: translateX(18px);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ZB Voice Reader</h2>
    <a href="index.html"
       style="color: #888; text-decoration: none; font-size: 12px; display: inline-flex; align-items: center; gap: 5px;">
        <span>←</span> ZBack
    </a>
    <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">

    <input type="file" id="pdf-input" accept=".pdf" style="font-size: 13px; color: #ccc;">

    <div id="viewer">Upload a PDF to begin...</div>

    <div class="controls">
        <div class="toggle-row">
            <span>Auto-scroll to reading position</span>
            <label class="switch">
                <input type="checkbox" id="auto-scroll" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="audio-buttons">
            <button id="play-btn">Play Voice</button>
            <button id="stop-btn">Stop</button>
        </div>
        <div id="status">Waiting for PDF...</div>
    </div>
</div>

<script>
    let sentences = [];
    let currentIndex = 0;
    let isPlaying = false;
    let audio = new Audio();

    const viewer = document.getElementById('viewer');
    const playBtn = document.getElementById('play-btn');
    const status = document.getElementById('status');
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    // 1. PDF Extraction & Sentence Splitting
    document.getElementById('pdf-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "Extracting text...";
        const reader = new FileReader();
        reader.onload = async function () {
            const pdf = await pdfjs.getDocument({data: new Uint8Array(this.result)}).promise;
            let fullText = "";

            // Extract all pages (limiting to first 5 for speed, adjust as needed)
            const maxPages = Math.min(pdf.numPages, 5);
            for (let i = 1; i <= maxPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(item => item.str).join(" ") + " ";
            }

            // Split into sentences using regex
            sentences = fullText.match(/[^.!?]+[.!?]*/g) || [fullText];
            renderText();
            status.innerText = `Ready. ${sentences.length} sentences found.`;
        };
        reader.readAsArrayBuffer(file);
    };

    // 2. Render clickable sentences
    function renderText() {
        viewer.innerHTML = sentences.map((s, i) =>
            `<span class="sent" id="s-${i}" onclick="jumpTo(${i})">${s}</span>`
        ).join(" ");
    }

    // 3. Core Synthesis Loop
    async function playSentence(index) {
        if (index >= sentences.length || !isPlaying) {
            if (index >= sentences.length) stopPlayback();
            return;
        }

        currentIndex = index;
        updateUI();

        status.innerText = `Synthesizing sentence ${index + 1}...`;

        try {
            const response = await fetch('http://localhost:5559/clone', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: sentences[index]})
            });

            if (!response.ok) throw new Error("Server Error");

            const blob = await response.blob();
            audio.src = URL.createObjectURL(blob);
            audio.play();

            audio.onended = () => {
                if (isPlaying) playSentence(currentIndex + 1);
            };
        } catch (err) {
            status.style.color = "#ff3b30";
            status.innerText = "Error: Check Python terminal.";
            isPlaying = false;
        }
    }

    function updateUI() {
        document.querySelectorAll('.sent').forEach(el => el.classList.remove('active'));
        const active = document.getElementById(`s-${currentIndex}`);
        if (active) {
            active.classList.add('active');
            if (document.getElementById('auto-scroll').checked) {
                active.scrollIntoView({behavior: 'smooth', block: 'center'});
            }
        }
    }

    // 4. Interaction Controls
    playBtn.onclick = () => {
        if (isPlaying) {
            pausePlayback();
        } else {
            startPlayback();
        }
    };

    function startPlayback() {
        if (sentences.length === 0) return alert("Please upload a PDF first.");
        isPlaying = true;
        playBtn.innerText = "Pause Voice";
        playBtn.style.background = "#ffcc00";
        playBtn.style.color = "#000";
        playSentence(currentIndex);
    }

    function pausePlayback() {
        isPlaying = false;
        audio.pause();
        playBtn.innerText = "Resume Voice";
        playBtn.style.background = "#007bff";
        playBtn.style.color = "#fff";
        status.innerText = "Paused.";
    }

    function stopPlayback() {
        isPlaying = false;
        audio.pause();
        currentIndex = 0;
        playBtn.innerText = "Play Voice";
        playBtn.style.background = "#007bff";
        playBtn.style.color = "#fff";
        status.innerText = "System Standby.";
        document.querySelectorAll('.sent').forEach(el => el.classList.remove('active'));
    }

    function jumpTo(index) {
        audio.pause();
        currentIndex = index;
        isPlaying = true;
        playBtn.innerText = "Pause Voice";
        playBtn.style.background = "#ffcc00";
        playBtn.style.color = "#000";
        playSentence(index);
    }

    document.getElementById('stop-btn').onclick = stopPlayback;
</script>
</body>
</html>

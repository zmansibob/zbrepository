<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZB - Multilingual Particle Morph</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            color: #00ffcc;
            font-family: monospace;
            transition: background 0.5s ease;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }


        /* Top Left Button Group with padding */
        .button-row {
            position: absolute;
            top: 25px; /* Top padding */
            left: 25px; /* Left padding */
            display: flex;
            flex-direction: row;
            gap: 12px;
            z-index: 100;
        }

        .home-btn {
            width: 44px;
            height: 44px;
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 18px;
            box-sizing: border-box;
        }

        /* Bottom Centered Language Menu */
        .lang-select {
            position: absolute;
            bottom: 35px; /* Bottom padding */
            left: 50%;
            transform: translateX(-50%);
            height: 44px;
            min-width: 220px;
            max-width: 85vw;
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            border-radius: 22px;
            padding: 0 20px;
            font-family: monospace;
            font-weight: bold;
            appearance: none;
            text-align: center;
            cursor: pointer;
            z-index: 100;
            outline: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .home-btn:hover, .lang-select:hover {
            box-shadow: 0 0 15px #00ffcc;
            background: rgba(0, 255, 204, 0.2);
        }

        option {
            background: #000;
            color: #ffffff;
        }

        #status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 10px;
            pointer-events: none;
            opacity: 0.4;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="button-row">
    <a href="index.html" id="homeBtn" class="home-btn" title="Back to Home">ZB</a>
    <button id="fullscreenBtn" class="home-btn" onclick="toggleFullScreen()" title="Fullscreen">&#129336;</button>
    <button id="downloadBtn" class="home-btn" title="ZB Down">&#128190;</button>
    <button id="toggleMode" class="home-btn" title="Switch Mode">&#128247;</button>

    <input type="range" id="scaleSlider" min="0" max="1.5" step="0.01" value="0.9"
           aria-label="Scale Particles"
           style="width: 100px; cursor: pointer; accent-color: #ffffff; vertical-align: middle;">
</div>

<label for="langSelect" style="display:none;">Select Language</label>
<select id="langSelect" class="lang-select"></select>

<div id="status">Status: Initializing...</div>
<canvas id="canvas"></canvas>

<script>

    let userScale = 0.9; // Default scale
    const scaleSlider = document.getElementById('scaleSlider');

    scaleSlider.addEventListener('input', (e) => {
        userScale = parseFloat(e.target.value);
        loadAllShapes(); // Re-map the points whenever the slider moves
    });

    // Stop the slider from triggering the image morph
    scaleSlider.addEventListener('mousedown', e => e.stopPropagation());
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    const status = document.getElementById('status');
    const modeBtn = document.getElementById('toggleMode');
    const langSelect = document.getElementById('langSelect');

    let particles = [];
    let shapeData = [];
    let currentIndex = 0;
    let displayMode = 0; // 0: Image, 1: Emoji, 2: Text
    let isScanning = false;
    let bgIsLight = false; // track background state for animate()

    // Items 0, 1, 2: Black BG | Items 3, 4, 5: White BG
    const LIGHT_BG_INDICES = new Set([3, 4, 5]);

    // Text Color Map per index: 0=White, 1=Red, 2=Yellow, 3=Green, 4=Blue, 5=Black
    const TEXT_COLORS = ["#FFFFFF", "#FF0000", "#FFFF00", "#00FF00", "#0000FF", "#000000"];

    const zbMap = [
        {
            lang: "English",
            words: ["I don't know", "Silence", "Breath", "Simple", "Complex", "Zmansi White Camel Bob"], // Added comma here
            letterbase: "Abc"
        },
        {
            lang: "Hebrew",
            words: ["אני לא יודעת", "שתיקה", "נשימה", "פשוט", "מורכב", "זמנסי גמל לבן בוב"],
            letterbase: "אבג"
        },
        {
            lang: "Russian",
            words: ["Я не знаю", "Молчание", "Дыхание", "Простой", "Сложный", "Зманסי Белый Верблюд Боб"],
            letterbase: "Абв"
        },
        {
            lang: "Polish",
            words: ["Nie wiem", "Cisza", "Oddech", "Proste", "Złożone", "Zmansi Biały Wielbłąd Bob"],
            letterbase: "Abc"
        },
        {
            lang: "Hindi",
            words: ["मुझे नहीं पता", "मौन", "साँस", "सरल", "जटिल", "ज़मन्सी सफेद ऊँट बॉब"],
            letterbase: "अबस"
        },
        {
            lang: "Hungarian",
            words: ["Nem tudom", "Némaság", "Légzés", "Egyszerű", "Összetett", "Zmansi Fehér Teve Bob"],
            letterbase: "Abc"
        },
        {
            lang: "German",
            words: ["Ich weiß nicht", "Schweigen", "Atem", "Einfach", "Komplex", "Zmansi Weißer Kamel Bob"],
            letterbase: "Abc"
        },
        {
            lang: "Spanish",
            words: ["No lo sé", "Silencio", "Respiración", "Simple", "Complejo", "Zmansi Camello Blanco Bob"],
            letterbase: "Abc"
        },
        {
            lang: "Arabic",
            words: ["لا أعرف", "صمت", "تنفس", "بسيط", "معقد", "زمانسي جمل أبيض بوب"],
            letterbase: "أبج"
        },
        {
            lang: "Dutch",
            words: ["Ik weet het niet", "Zwijgen", "Adem", "Eenvoudig", "Complex", "Zmansi Witte Kameel Bob"],
            letterbase: "Abc"
        },
        {
            lang: "Japanese",
            words: ["わからない", "沈黙", "呼吸", "単純", "複雑", "ズマンシ 白いラクダ ボブ"],
            letterbase: "あいう"
        }
    ];

    const zbMark = ["idk", ".", ",", ";", "\"", "@"];

    const animalImages = [`img/01_pussycat.png`, `img/02_bitch.png`, `img/03_octopussy.png`, `img/04_octopus.png`, `img/05_dog.png`, `img/06_camel.png`];
    const animalImagesNbg = [
        `img/01_pussycat_nbg.png`,
        `img/02_bitch_nbg.png`,
        `img/03_octopussy_nbg.png`,
        `img/04_octopus_nbg.png`,
        `img/05_dog_nbg.png`,
        `img/06_camel_nbg.png`
    ];
    const animalImagesLn = [
        `img/01_pussycat_ln.png`,
        `img/02_bitch_ln.png`,
        `img/03_octopussy_ln.png`,
        `img/04_octopus_ln.png`,
        `img/05_dog_ln.png`,
        `img/06_camel_ln.png`
    ];
    const fallbackEmojis = ["🐱", "🐕", "🐙", "🦑", "🐶", "🐫"];

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.destX = this.x;
            this.destY = this.y;
            this.color = '#ffffff';
            this.destColor = '#ffffff';
            this.ease = 0.08;
        }

        update() {
            this.x += (this.destX - this.x) * this.ease;
            this.y += (this.destY - this.y) * this.ease;
            this.color = this.destColor;
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, 2, 2);
        }
    }

    function extractPoints(data, iw, ih, customColor = null, isTextMode = false, overrideStep = null) {
        const points = [];
        const step = overrideStep || (isTextMode ? 4 : 2);

        for (let y = 0; y < ih; y += step) {
            for (let x = 0; x < iw; x += step) {
                const i = (y * iw + x) * 4;
                if (data[i + 3] < 50) continue; // Alpha threshold

                points.push({
                    x,
                    y,
                    color: customColor || `rgb(${data[i]},${data[i + 1]},${data[i + 2]})`
                });
            }
        }
        return points.length > 0 ? points : [{x: iw / 2, y: ih / 2, color: '#ffffff'}];
    }

    async function scanSource(index) {
    const tc = document.createElement('canvas');
    const tCtx = tc.getContext('2d');
    const isLight = LIGHT_BG_INDICES.has(index);
    const base = 800;
    const ratio = canvas.width / canvas.height;

    tc.width = ratio > 1 ? base : Math.floor(base * ratio);
    tc.height = ratio > 1 ? Math.floor(base / ratio) : base;

    const sw = tc.width;
    const sh = tc.height;

    return new Promise((resolve) => {
        const shortSide = Math.min(sw, sh);

        if (displayMode === 2) { // TEXT Mode
            let text = zbMap[parseInt(langSelect.value)].words[index];

            // --- Casing Logic ---
            if (index === 1) {
                text = text.toLowerCase();
            } else if (index === 4) {
                text = text.toUpperCase();
            }

            // --- Surgical Fix for Item [5] ---
            let fontSize = Math.floor(shortSide * 0.15);

            if (index === 5) {
                // 1. Force a slightly smaller font for the long string to ensure crisp edges
                fontSize = Math.floor(shortSide * 0.12);
                tCtx.font = `bold ${fontSize}px monospace`;
                // 2. Add letter spacing to prevent "m" and "W" clumping
                tCtx.letterSpacing = "5px";
            } else {
                tCtx.font = `bold ${fontSize}px monospace`;
                tCtx.letterSpacing = "0px"; // Ensure others stay tight
            }

            while (tCtx.measureText(text).width > sw * 0.7 && fontSize > 10) {
                fontSize -= 2;
                tCtx.font = `bold ${fontSize}px monospace`;
            }

            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.fillStyle = '#ffffff';
            tCtx.fillText(text, sw / 2, sh / 2);

            const data = tCtx.getImageData(0, 0, sw, sh).data;

            // --- Point Density Manipulation for [5] ---
            // If the text is still unclear, we can pass a 'false' for the 5th param
            // of extractPoints to get a higher density (step of 2 instead of 4)
            const isExtreme = (index === 5);
            const points = extractPoints(data, sw, sh, TEXT_COLORS[index], true, isExtreme ? 2 : 4);

            resolve({points: mapToScreen(points), isLight});

        } else if (displayMode === 1) {
            // ... (Emoji logic remains exactly the same)
            tCtx.font = `${Math.floor(shortSide * 0.4)}px sans-serif`;
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.fillText(fallbackEmojis[index], sw / 2, sh / 2);
            const data = tCtx.getImageData(0, 0, sw, sh).data;
            resolve({points: mapToScreen(extractPoints(data, sw, sh, null, false, 4)), isLight});

        } else {
            // ... (Image logic remains exactly the same)
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = () => {
                const scale = Math.min(sw * 0.65 / img.width, sh * 0.65 / img.height);
                const iw = img.width * scale;
                const ih = img.height * scale;
                tCtx.drawImage(img, (sw - iw) / 2, (sh - ih) / 2, iw, ih);
                const data = tCtx.getImageData(0, 0, sw, sh).data;
                resolve({points: mapToScreen(extractPoints(data, sw, sh)), isLight});
            };
            img.src = animalImagesLn[index];
        }
    });
}

    // Helper to project virtual points to real screen size
    function mapToScreen(points) {
        if (points.length === 0) return [];
        const cw = canvas.width;
        const ch = canvas.height;

        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        points.forEach(p => {
            if (p.x < minX) minX = p.x;
            if (p.x > maxX) maxX = p.x;
            if (p.y < minY) minY = p.y;
            if (p.y > maxY) maxY = p.y;
        });

        const realW = maxX - minX;
        const realH = maxY - minY;

        // Use 0.85 for tight containment - 15% total screen padding
        const padding = 0.85;
        const scaleX = (cw * padding) / realW;
        const scaleY = (ch * padding) / realH;

        const baseScale = Math.min(scaleX, scaleY);
        const finalScale = baseScale * userScale;

        // Offset centers the shape based on the tightest bounding box found
        const offsetX = (cw - realW * finalScale) / 2 - minX * finalScale;
        const offsetY = (ch - realH * finalScale) / 2 - minY * finalScale;

        return points.map(p => ({
            x: p.x * finalScale + offsetX,
            y: p.y * finalScale + offsetY,
            color: p.color
        }));
    }

    function updateModeButtonUI() {
        const langIdx = parseInt(langSelect.value);
        const selectedLang = zbMap[langIdx];

        // index 0: Camera icon
        // index 1: Emoji
        // index 2: Dynamic Letterbase from the map
        const labels = ["\uD83D\uDCF7", "\uD83D\uDE00", selectedLang.letterbase];

        // Force the innerText update
        modeBtn.innerText = labels[displayMode];
    }


    // Update logic for changing the language
    langSelect.addEventListener('change', async () => {
        updateModeButtonUI(); // This ensures "Abc" changes to "אבג" immediately
        if (displayMode === 2) {
            await loadAllShapes();
        }
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            // Force the canvas to match the new portrait window size
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Re-scan and re-map points so they fit the new aspect ratio
            loadAllShapes();
        }, 200);
    });

    // Prevent clicks on the language selector from reaching the window morph logic
    langSelect.addEventListener('mousedown', e => e.stopPropagation());
    langSelect.addEventListener('touchstart', e => e.stopPropagation());

    // 1. Function to populate the dropdown dynamically
    function populateLanguageMenu() {
        langSelect.innerHTML = ""; // Clear existing

        zbMap.forEach((entry, index) => {
            const option = document.createElement('option');
            option.value = index.toString();

            // Use the last item in the 'words' array for the label (e.g., "Zmansi White Camel Bob")
            option.textContent = entry.words[entry.words.length - 1];

            langSelect.appendChild(option);
        });
    }


    async function loadAllShapes() {
        if (langSelect.options.length === 0) populateLanguageMenu();

        isScanning = true;
        let newShapes = []; // Temporary container

        for (let i = 0; i < 6; i++) {
            status.innerText = `Scanning ${i + 1}/6...`;
            const result = await scanSource(i);
            newShapes.push(result);
        }

        // Switch the whole set at once
        shapeData = newShapes;
        isScanning = false;

        // Now trigger the morph for the current view
        morph(currentIndex);
    }

    function morph(index) {
        // 1. Immediate UI Feedback
        const currentMark = zbMark[index] || "";
        status.innerText = "zb" + currentMark;

        // 2. Safety Guard
        if (!shapeData || !shapeData[index]) return;

        const entry = shapeData[index];
        bgIsLight = entry.isLight;
        const uiColor = bgIsLight ? "#000000" : "#ffffff";

        // 3. Particle Morphing Logic
        particles.forEach((p, i) => {
            const t = entry.points[i % entry.points.length];
            p.destX = t.x;
            p.destY = t.y;
            p.destColor = t.color;
        });

        // 4. Background Transition
        document.body.style.background = bgIsLight ? "#FFFFFF" : "#000000";

        // 5. UI Elements Color Swap
        const homeBtn = document.getElementById('homeBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const scaleSlider = document.getElementById('scaleSlider');

        const uiElements = [
            langSelect,
            modeBtn,
            downloadBtn,
            fullscreenBtn,
            homeBtn,
            scaleSlider
        ];

        uiElements.forEach(el => {
            if (el) {
                el.style.color = uiColor;
                el.style.borderColor = uiColor;

                if (el.id === "scaleSlider") {
                    // Keep the slider thumb visible against light/dark backgrounds
                    el.style.accentColor = uiColor;
                } else {
                    // Background tint for buttons and dropdowns
                    el.style.background = bgIsLight ? "rgba(0,0,0,0.05)" : "rgba(0,255,204,0.1)";
                }
            }
        });

        // 6. Home Button Emoji Toggle
        if (homeBtn) {
            if (bgIsLight) {
                // White BG -> 🖕🏿 (Dark Skin)
                homeBtn.innerHTML = "\u{1F595}\u{1F3FF}";
            } else {
                // Black BG -> 🖕🏻 (Light Skin)
                homeBtn.innerHTML = "\u{1F595}\u{1F3FB}";
            }
        }

        // 7. Fullscreen Button Emoji Toggle
        if (fullscreenBtn) {
            if (bgIsLight) {
                // White BG -> ☕️ (Hot Beverage)
                fullscreenBtn.innerHTML = "\u{2615}";
            } else {
                // Black BG -> 🍺 (Beer Mug)
                fullscreenBtn.innerHTML = "\u{1F37A}";
            }
        }

        // 8. Final Status & Global UI Styling
        status.style.color = uiColor;
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.error(`Error attempting to enable full-screen mode: ${err.message}`);
            });
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }

    function animate() {
        // ✅ Use bgIsLight boolean instead of parsing body style string
        ctx.fillStyle = bgIsLight
            ? "rgba(255,255,255,0.08)"
            : "rgba(0,0,0,0.15)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animate);
    }

    // Place this near the bottom with your other listeners
    modeBtn.addEventListener('click', async () => {
        // 1. Advance the mode
        displayMode = (displayMode + 1) % 3;

        // 2. Update the button text (📷 -> 😀 -> Abc/אבג)
        updateModeButtonUI();

        // 3. Trigger the particle scan
        await loadAllShapes();
    });

    langSelect.addEventListener('change', async () => {
        // 1. Update UI (e.g. "Abc" becomes "אבג")
        updateModeButtonUI();

        // 2. Invalidate the Text cache since words have changed
        if (typeof shapeCache !== 'undefined') {
            shapeCache[2] = null;
        }

        // 3. Only re-scan if the user is currently looking at the Text mode
        if (displayMode === 2) {
            await loadAllShapes();
        }
    });

    window.addEventListener('mousedown', e => {
        // If the click is on a button, the select menu, or during a scan, DO NOTHING
        if (e.target.closest('.button-row') ||
            e.target.closest('.lang-select') ||
            isScanning) {
            return;
        }

        currentIndex = (currentIndex + 1) % 6;
        morph(currentIndex);
    });

    const downloadBtn = document.getElementById('downloadBtn');

    downloadBtn.addEventListener('click', () => {
        // 1. Create a temporary link element
        const link = document.createElement('a');

        // 2. Set the filename based on the current animal/index
        const langIdx = parseInt(langSelect.value);
        const currentWord = zbMap[langIdx].words[currentIndex].replace(/\s+/g, '_');
        link.download = `ZB_${currentWord}_${Date.now()}.png`;

        // 3. Convert canvas to data URL and trigger click
        link.href = canvas.toDataURL("image/png");
        link.click();
    });

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    for (let i = 0; i < 4000; i++) particles.push(new Particle());

    populateLanguageMenu();
    updateModeButtonUI();
    animate();
    loadAllShapes();
</script>
</body>
</html>

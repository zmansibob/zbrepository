<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZB - Multilingual Particle Morph</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            color: #00ffcc;
            font-family: monospace;
            transition: background 0.5s ease;
        }

        canvas {
            display: block;
        }

        #status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0.6;
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        /* Standardized class for ALL circular buttons */
        .home-btn, .lang-select {
            height: 44px;
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box; /* Keeps dimensions exact */
        }

        .home-btn {
            width: 44px;
            padding: 0;
            border-radius: 50%;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-size: 18px; /* Adjusts icon/text size */
        }

        .lang-select {
            border-radius: 22px;
            padding: 0 15px;
            font-family: monospace;
            appearance: none;
            text-align: center;
            display: flex;
            align-items: center;
        }

        .home-btn:hover, .lang-select:hover {
            box-shadow: 0 0 15px #00ffcc;
            background: rgba(0, 255, 204, 0.2);
        }

        option {
            background: #000;
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="controls">
    <label for="langSelect" style="display:none;">Select Language</label>
    <select id="langSelect" class="lang-select">
    </select>

    <button id="toggleMode" class="home-btn" title="Switch Mode">&#128247;</button>
    <button id="downloadBtn" class="home-btn" title="ZB Down">💾</button>
    <a href="index.html" class="home-btn" title="Back to Home">ZB</a>
</div>

<div id="status">Status: Initializing...</div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    const status = document.getElementById('status');
    const modeBtn = document.getElementById('toggleMode');
    const langSelect = document.getElementById('langSelect');

    let particles = [];
    let shapeData = [];
    let currentIndex = 0;
    let displayMode = 0; // 0: Image, 1: Emoji, 2: Text
    let isScanning = false;
    let bgIsLight = false; // track background state for animate()

    // Items 0, 1, 2: Black BG | Items 3, 4, 5: White BG
    const LIGHT_BG_INDICES = new Set([3, 4, 5]);

    // Text Color Map per index: 0=White, 1=Red, 2=Yellow, 3=Green, 4=Blue, 5=Black
    const TEXT_COLORS = ["#FFFFFF", "#FF0000", "#FFFF00", "#00FF00", "#0000FF", "#000000"];

    const zbMap = [
        {
            lang: "English",
            words: ["I don't know", "Silence", "Breath", "Simple", "Complex", "Zmansi White Camel Bob"], // Added comma here
            letterbase: "Abc"
        },
        {
            lang: "Hebrew",
            words: ["אני לא יודעת", "שתיקה", "נשימה", "פשוט", "מורכב", "זמנסי גמל לבן בוב"],
            letterbase: "אבג"
        },
        {
            lang: "Russian",
            words: ["Я не знаю", "Молчание", "Дыхание", "Простой", "Сложный", "Зманסי Белый Верблюд Боб"],
            letterbase: "Абв"
        },
        {
            lang: "Hindi",
            words: ["मुझे नहीं पता", "मौन", "साँस", "सरल", "जटिल", "ज़मन्सी सफेद ऊँट बॉब"],
            letterbase: "अबस"
        },
        {
            lang: "Hungarian",
            words: ["Nem tudom", "Némaság", "Légzés", "Egyszerű", "Összetett", "Zmansi Fehér Teve Bob"],
            letterbase: "Abc"
        },
        {
            lang: "German",
            words: ["Ich weiß nicht", "Schweigen", "Atem", "Einfach", "Komplex", "Zmansi Weißer Kamel Bob"],
            letterbase: "Abc"
        },
        {
            lang: "Spanish",
            words: ["No lo sé", "Silencio", "Respiración", "Simple", "Complejo", "Zmansi Camello Blanco Bob"],
            letterbase: "Abc"
        },
        {
            lang: "Arabic",
            words: ["لا أعرف", "صمت", "تنفس", "بسيط", "معقد", "زمانسي جمل أبيض بوب"],
            letterbase: "أبج"
        },
        {
            lang: "Dutch",
            words: ["Ik weet het niet", "Zwijgen", "Adem", "Eenvoudig", "Complex", "Zmansi Witte Kameel Bob"],
            letterbase: "Abc"
        },
        {
            lang: "Japanese",
            words: ["わからない", "沈黙", "呼吸", "単純", "複雑", "ズマンシ 白いラクダ ボブ"],
            letterbase: "あいう"
        }
    ];

    const zbMark = ["idk", ".", ",", ";", "\"", "@"];

    const animalImages = [`img/01_pussycat.png`, `img/02_bitch.png`, `img/03_octopussy.png`, `img/04_octopus.png`, `img/05_dog.png`, `img/06_camel.png`];
    const animalImagesNbg = [
        `img/01_pussycat_nbg.png`,
        `img/02_bitch_nbg.png`,
        `img/03_octopussy_nbg.png`,
        `img/04_octopus_nbg.png`,
        `img/05_dog_nbg.png`,
        `img/06_camel_nbg.png`
    ];
    const animalImagesLn = [
        `img/01_pussycat_ln.png`,
        `img/02_bitch_ln.png`,
        `img/03_octopussy_ln.png`,
        `img/04_octopus_ln.png`,
        `img/05_dog_ln.png`,
        `img/06_camel_ln.png`
    ];
    const fallbackEmojis = ["🐱", "🐕", "🐙", "🦑", "🐶", "🐫"];

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.destX = this.x;
            this.destY = this.y;
            this.color = '#ffffff';
            this.destColor = '#ffffff';
            this.ease = 0.08;
        }

        update() {
            this.x += (this.destX - this.x) * this.ease;
            this.y += (this.destY - this.y) * this.ease;
            this.color = this.destColor;
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, 2, 2);
        }
    }

    function extractPoints(data, iw, ih, customColor = null, isTextMode = false) {
        const points = [];
        // Step 2 provides great detail for the thin lines of the camel and octopus
        const step = isTextMode ? 4 : 2;

        for (let y = 0; y < ih; y += step) {
            for (let x = 0; x < iw; x += step) {
                const i = (y * iw + x) * 4;
                const alpha = data[i + 3];

                // If alpha is > 50, it's part of the animal.
                // This captures the thin legs and the white body perfectly.
                if (alpha < 50) continue;

                const r = data[i], g = data[i + 1], b = data[i + 2];

                points.push({
                    x,
                    y,
                    // Use ZB Frequency color if provided, else use the image color
                    color: customColor || `rgb(${r},${g},${b})`
                });
            }
        }
        return points.length > 0 ? points : [{x: iw / 2, y: ih / 2, color: '#ffffff'}];
    }

    async function scanSource(index) {
        const tc = document.createElement('canvas');
        const tCtx = tc.getContext('2d');
        const isLight = LIGHT_BG_INDICES.has(index);

        return new Promise((resolve) => {
            if (displayMode === 2) {
                // --- TEXT MODE ---
                const shortSide = Math.min(canvas.width, canvas.height);
                const langIdx = parseInt(langSelect.value);
                const text = zbMap[langIdx].words[index];
                tc.width = canvas.width;
                tc.height = canvas.height;
                let fontSize = Math.floor(shortSide * 0.12);
                tCtx.font = `bold ${fontSize}px monospace`;
                const maxW = canvas.width * 0.9;
                while (tCtx.measureText(text).width > maxW && fontSize > 10) {
                    fontSize -= 2;
                    tCtx.font = `bold ${fontSize}px monospace`;
                }
                tCtx.textAlign = 'center';
                tCtx.textBaseline = 'middle';
                tCtx.fillStyle = '#ffffff';
                tCtx.fillText(text, tc.width / 2, tc.height / 2);
                const data = tCtx.getImageData(0, 0, tc.width, tc.height).data;
                resolve({points: extractPoints(data, tc.width, tc.height, TEXT_COLORS[index], true), isLight});
            } else if (displayMode === 1) {
                // --- EMOJI MODE ---
                const shortSide = Math.min(canvas.width, canvas.height);
                tc.width = canvas.width;
                tc.height = canvas.height;
                const fontSize = Math.floor(shortSide * 0.35);
                tCtx.font = `${fontSize}px serif`;
                tCtx.textAlign = 'center';
                tCtx.textBaseline = 'middle';
                tCtx.fillText(fallbackEmojis[index], tc.width / 2, tc.height / 2);
                const data = tCtx.getImageData(0, 0, tc.width, tc.height).data;
                resolve({points: extractPoints(data, tc.width, tc.height, null, false), isLight});
            } else {
                // --- IMAGE MODE ---
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onerror = () => { // Removed (e)
                    resolve({points: [{x: canvas.width / 2, y: canvas.height / 2, color: '#ffffff'}], isLight});
                };
                img.onload = () => {
                    const maxW = canvas.width * 0.7;
                    const maxH = canvas.height * 0.7;
                    const scale = Math.min(maxW / img.width, maxH / img.height);
                    const iw = img.width * scale;
                    const ih = img.height * scale;
                    tc.width = canvas.width;
                    tc.height = canvas.height;
                    const ox = (canvas.width - iw) / 2;
                    const oy = (canvas.height - ih) / 2;
                    tCtx.drawImage(img, ox, oy, iw, ih);
                    try {
                        const data = tCtx.getImageData(0, 0, tc.width, tc.height).data;
                        resolve({points: extractPoints(data, tc.width, tc.height, null, false), isLight});
                    } catch { // Removed (e)
                        resolve({points: [{x: canvas.width / 2, y: canvas.height / 2, color: '#ff0000'}], isLight});
                    }
                };
                img.src = animalImagesLn[index];
            }
        });
    }

    function updateModeButtonUI() {
        const langIdx = parseInt(langSelect.value);
        const selectedLang = zbMap[langIdx];

        // index 0: Camera icon
        // index 1: Emoji
        // index 2: Dynamic Letterbase from the map
        const labels = ["\uD83D\uDCF7", "\uD83D\uDE00", selectedLang.letterbase];

        // Force the innerText update
        modeBtn.innerText = labels[displayMode];
    }


    // Update logic for changing the language
    langSelect.addEventListener('change', async () => {
        updateModeButtonUI(); // This ensures "Abc" changes to "אבג" immediately
        if (displayMode === 2) {
            await loadAllShapes();
        }
    });

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        loadAllShapes();
    });

    // 1. Function to populate the dropdown dynamically
    function populateLanguageMenu() {
        langSelect.innerHTML = ""; // Clear existing

        zbMap.forEach((entry, index) => {
            const option = document.createElement('option');
            option.value = index.toString();

            // Use the last item in the 'words' array for the label (e.g., "Zmansi White Camel Bob")
            option.textContent = entry.words[entry.words.length - 1];

            langSelect.appendChild(option);
        });
    }


    async function loadAllShapes() {
        // Populate the menu first if it hasn't been done
        if (langSelect.options.length === 0) populateLanguageMenu();

        isScanning = true;
        shapeData = [];
        for (let i = 0; i < 6; i++) {
            status.innerText = `Scanning ${i + 1}/6...`;
            shapeData.push(await scanSource(i));
        }
        isScanning = false;

        // Instead of status.innerText = "Ready.",
        // we call morph to set the correct ZB mark for the current index
        morph(currentIndex);
    }

    function morph(index) {
        if (!shapeData[index]) return;
        const entry = shapeData[index];
        bgIsLight = entry.isLight;
        const uiColor = bgIsLight ? "#000000" : "#ffffff";

        particles.forEach((p, i) => {
            const t = entry.points[i % entry.points.length];
            p.destX = t.x;
            p.destY = t.y;
            p.destColor = t.color;
        });

        document.body.style.background = bgIsLight ? "#FFFFFF" : "#000000";

        // Update UI elements color
        [langSelect, modeBtn, downloadBtn, document.querySelector('.home-btn[title="Back to Home"]')].forEach(el => {
            if (el) {
                el.style.color = uiColor;
                el.style.borderColor = uiColor;
                el.style.background = bgIsLight ? "rgba(0,0,0,0.05)" : "rgba(0,255,204,0.1)";
            }
        });

        // --- NEW STATUS LOGIC ---
        // Maps the index to the mark (e.g., index 0 -> zb_)
        const currentMark = zbMark[index] || "";
        status.innerText = "zb" + currentMark;
        status.style.color = uiColor;
    }

    function animate() {
        // ✅ Use bgIsLight boolean instead of parsing body style string
        ctx.fillStyle = bgIsLight
            ? "rgba(255,255,255,0.08)"
            : "rgba(0,0,0,0.15)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animate);
    }

    // Place this near the bottom with your other listeners
    modeBtn.addEventListener('click', async () => {
        // 1. Advance the mode
        displayMode = (displayMode + 1) % 3;

        // 2. Update the button text (📷 -> 😀 -> Abc/אבג)
        updateModeButtonUI();

        // 3. Trigger the particle scan
        await loadAllShapes();
    });

    // When changing the language dropdown
    langSelect.addEventListener('change', async () => {
        updateModeButtonUI(); // Fixed: Changed from updateModeButtonLabel
        if (displayMode === 2) await loadAllShapes();
    });

    langSelect.addEventListener('change', async () => {
        if (displayMode === 2) await loadAllShapes();
    });

    window.addEventListener('mousedown', e => {
        if (e.target.closest('.controls') || isScanning) return;
        currentIndex = (currentIndex + 1) % 6;
        morph(currentIndex);
    });

    const downloadBtn = document.getElementById('downloadBtn');

    downloadBtn.addEventListener('click', () => {
        // 1. Create a temporary link element
        const link = document.createElement('a');

        // 2. Set the filename based on the current animal/index
        const langIdx = parseInt(langSelect.value);
        const currentWord = zbMap[langIdx].words[currentIndex].replace(/\s+/g, '_');
        link.download = `ZB_${currentWord}_${Date.now()}.png`;

        // 3. Convert canvas to data URL and trigger click
        link.href = canvas.toDataURL("image/png");
        link.click();
    });

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    for (let i = 0; i < 4000; i++) particles.push(new Particle());

    populateLanguageMenu();
    updateModeButtonUI();
    animate();
    loadAllShapes();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZB - Floating Dictionary</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --mode-bg: #ffffff;
            --mode-text: #000000;
            --mode-border: rgba(0, 0, 0, 0.1);
            --z-color: #ffffff;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #f4f4f9;
            color: var(--mode-text);
        }

        #field {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Floating Nodes */
        .word-node {
            position: absolute;
            font-size: 16px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 999px;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
            will-change: transform;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
        }

        #ui {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        #ui > * {
            pointer-events: all;
        }

        #topbar {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #logo {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: -1px;
        }

        /* Menu */
        .menu-wrapper {
            position: relative;
        }

        .expand-btn {
            width: 44px;
            height: 44px;
            background: #000;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .inner-circle {
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
        }

        .dropdown {
            position: absolute;
            top: 55px;
            right: 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            display: none;
            flex-direction: column;
            min-width: 180px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            z-index: 100;
            overflow: hidden;
        }

        .dropdown.active {
            display: flex;
        }

        .dropdown a, .dropdown button {
            padding: 14px 18px;
            text-decoration: none;
            color: #000;
            font-weight: 600;
            font-size: 14px;
            border: none;
            background: none;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        /* Input Area */
        #input-area {
            padding: 0 20px 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #word-input {
            flex: 1;
            background: #fff;
            border: 1.5px solid var(--mode-border);
            border-radius: 999px;
            padding: 14px 22px;
            font-size: 16px;
            outline: none;
            transition: border-left 0.2s;
        }

        #word-input.z-active {
            border-left: 12px solid var(--z-color) !important;
        }

        #launch-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #000;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #launch-btn svg {
            fill: #fff;
        }

        /* Color Toggles */
        #marks {
            padding: 0 20px 100px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .color-toggle {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15);
        }

        .color-toggle.active {
            border-color: #000;
            transform: scale(1.15);
        }

        /* Stored Panel */
        #stored-panel {
            position: fixed;
            inset: 0;
            z-index: 20;
            background: #fff;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            color: #000;
        }

        #stored-panel.open {
            transform: translateY(0);
        }

        /* Fix for the stretching bars in the dictionary */
        #stored-words {
            align-items: flex-start; /* Key fix: prevents children from stretching to full height */
            align-content: flex-start;
        }

        .stored-item {
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            height: fit-content; /* Hugs the text height */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* Zmansi Classes */
        .z-0 {
            background: #000000 !important;
            color: #ffffff !important;
        }

        .z-dot {
            background: #ff3b30 !important;
            color: #ffffff !important;
        }

        .z-comma {
            background: #ffcc00 !important;
            color: #000000 !important;
        }

        .z-semi {
            background: #34c759 !important;
            color: #ffffff !important;
        }

        .z-quote {
            background: #007aff !important;
            color: #ffffff !important;
        }

        .z-at {
            background: #ffffff !important;
            color: #000000 !important;
            border: 1px solid #ddd !important;
        }
    </style>
</head>
<body>

<div id="field"></div>

<div id="ui">
    <div id="topbar">
        <div id="logo">ZB</div>
        <div class="menu-wrapper">
            <button class="expand-btn" onclick="document.getElementById('dd').classList.toggle('active')">
                <div class="inner-circle"></div>
            </button>
            <div id="dd" class="dropdown">
                <a href="zbaskkey.html">Ask Key ?</a>
                <a href="zb_voiceme.html">Voice Reader 🎙️</a>
                <button onclick="document.getElementById('stored-panel').classList.add('open')">Stored Dictionary
                </button>
            </div>
        </div>
    </div>
    <div style="flex:1;"></div>
    <div id="input-area">
        <input id="word-input" type="text" placeholder="Type a word..." autocomplete="off">
        <button id="launch-btn">
            <svg width="24" height="24" viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
    <div id="marks">
        <div class="color-toggle" data-sign=" " style="background:#000000;"></div>
        <div class="color-toggle" data-sign="." style="background:#ff3b30;"></div>
        <div class="color-toggle" data-sign="," style="background:#ffcc00;"></div>
        <div class="color-toggle" data-sign=";" style="background:#34c759;"></div>
        <div class="color-toggle" data-sign='"' style="background:#007aff;"></div>
        <div class="color-toggle active" data-sign="@" style="background:#ffffff; border:1px solid #ddd;"></div>
    </div>
</div>

<div id="stored-panel">
    <button onclick="document.getElementById('stored-panel').classList.remove('open')"
            style="padding:20px; border:none; background:none; font-size:24px; cursor:pointer;">✕
    </button>
    <div style="padding:0 24px; font-weight:900; font-size:24px;">Dictionary</div>
    <div id="stored-words" style="padding:20px; flex:1; overflow-y:auto; display:flex; flex-wrap:wrap; gap:10px;"></div>
</div>

<script>
    let nodes = [];
    let storedWords = JSON.parse(localStorage.getItem('zb_dictionary')) || [];

    const zbScheme = {
        ' ': {color: '#000000', text: '#ffffff', class: 'z-0'},
        '.': {color: '#ff3b30', text: '#ffffff', class: 'z-dot'},
        ',': {color: '#ffcc00', text: '#000000', class: 'z-comma'},
        ';': {color: '#34c759', text: '#ffffff', class: 'z-semi'},
        '"': {color: '#007aff', text: '#ffffff', class: 'z-quote'},
        '@': {color: '#ffffff', text: '#000000', class: 'z-at'}
    };

    let activeColor = zbScheme['@'].color;
    let activeZClass = zbScheme['@'].class;
    const input = document.getElementById('word-input');

    function wrapComplexText(text) {
        const tokens = text.split(/([ .,;"@])/g);
        return tokens.map(token => {
            const theme = zbScheme[token];
            return theme ? `<span class="${theme.class}" style="padding: 0 4px; border-radius: 4px;">${token}</span>` : token;
        }).join('');
    }

    function updateStoredUI() {
        const container = document.getElementById('stored-words');
        container.innerHTML = storedWords.map(item => `
        <div class="stored-item ${item.zClass || ''}"
             style="background:${item.color}; color:${item.textColor};">
            ${wrapComplexText(item.text)}
        </div>
    `).join('');
    }

    function applyTheme(sign) {
        const theme = zbScheme[sign];
        if (!theme) return;
        activeColor = theme.color;
        activeZClass = theme.class;
        input.style.setProperty('--z-color', activeColor);
        input.classList.add('z-active');
        document.querySelectorAll('.color-toggle').forEach(el => el.classList.toggle('active', el.dataset.sign === sign));
    }

    input.oninput = () => {
        const val = input.value;
        if (!val) {
            input.classList.remove('z-active');
            return;
        }
        let lastSign = null;
        for (let i = val.length - 1; i >= 0; i--) {
            if (zbScheme[val[i]]) {
                lastSign = val[i];
                break;
            }
        }
        if (lastSign) applyTheme(lastSign);
    };

    document.querySelectorAll('.color-toggle').forEach(t => t.onclick = () => applyTheme(t.dataset.sign));

    function handleSend() {
        const text = input.value;
        if (!text.trim()) return;

        storedWords.push({
            text,
            color: activeColor,
            textColor: activeColor === '#ffffff' ? '#000' : '#fff',
            zClass: activeZClass
        });
        localStorage.setItem('zb_dictionary', JSON.stringify(storedWords));
        updateStoredUI();

        const el = document.createElement('div');
        el.className = `word-node ${activeZClass}`;
        el.innerHTML = wrapComplexText(text);
        const x = Math.random() * (window.innerWidth - 150);
        const y = Math.random() * (window.innerHeight - 300) + 100;
        document.getElementById('field').appendChild(el);

        const nodeObj = {el, x, y, dx: (Math.random() - 0.5) * 2, dy: (Math.random() - 0.5) * 2};
        nodes.push(nodeObj);

        setTimeout(() => {
            el.style.opacity = '0';
            nodes = nodes.filter(n => n !== nodeObj);
            setTimeout(() => el.remove(), 1000);
        }, 10000);

        input.value = '';
        input.classList.remove('z-active');
    }

    document.getElementById('launch-btn').onclick = handleSend;
    input.onkeypress = (e) => {
        if (e.key === 'Enter') handleSend();
    };

    function animate() {
        nodes.forEach(n => {
            n.x += n.dx;
            n.y += n.dy;
            if (n.x < 0 || n.x > window.innerWidth - 100) n.dx *= -1;
            if (n.y < 0 || n.y > window.innerHeight - 200) n.dy *= -1;
            n.el.style.transform = `translate(${n.x}px, ${n.y}px)`;
        });
        requestAnimationFrame(animate);
    }

    updateStoredUI();
    animate();
</script>
</body>
</html>

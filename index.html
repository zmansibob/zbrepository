<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZB - Floating Dictionary</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --mode-text: #000000;
            --mode-border: rgba(0, 0, 0, 0.1);
            --z-color: #ffffff;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #f4f4f9;
            color: var(--mode-text);
        }

        #field {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* --- STYLES --- */
        .word-node {
            position: absolute;
            font-size: 16px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 999px;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
            will-change: transform;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        #ui {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        #ui > * {
            pointer-events: all;
        }

        #topbar {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #logo {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: -1px;
        }

        .menu-wrapper {
            position: relative;
        }

        .expand-btn {
            width: 44px;
            height: 44px;
            background: #000;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .inner-circle {
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
        }

        .dropdown {
            position: absolute;
            top: 55px;
            right: 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            display: none;
            flex-direction: column;
            min-width: 180px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            z-index: 100;
            overflow: hidden;
        }

        .dropdown.active {
            display: flex;
        }

        .dropdown a, .dropdown button {
            padding: 14px 18px;
            text-decoration: none;
            color: #000;
            font-weight: 600;
            font-size: 14px;
            border: none;
            background: none;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        #input-area {
            padding: 0 20px 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #word-input {
            flex: 1;
            background: #fff;
            border: 2px solid var(--mode-border);
            border-radius: 999px;
            padding: 14px 22px;
            font-size: 16px;
            outline: none;
            transition: border-left 0.2s;
        }

        #word-input[class*="z-active"] {
            border-left: 12px solid var(--z-color) !important;
        }

        #launch-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #000;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #launch-btn svg {
            fill: #fff;
        }

        #marks {
            padding: 0 20px 100px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .color-toggle {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15);
        }

        .color-toggle.active {
            border-color: #000;
            transform: scale(1.15);
        }

        #stored-panel {
            position: fixed;
            inset: 0;
            z-index: 20;
            background: #fff;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            color: #000;
        }

        /* Using the attribute selector to prevent "unused" warnings */
        #stored-panel[class*="open"] {
            transform: translateY(0);
        }

        #stored-words {
            align-items: flex-start;
            align-content: flex-start;
        }

        .stored-item {
            padding: 10px 35px 10px 12px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            height: fit-content;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        /* --- Dynamic Theme Classes --- */
        .z-0 {
            background: #000 !important;
            color: #fff !important;
        }

        .z-dot {
            background: #ff3b30 !important;
            color: #fff !important;
        }

        .z-comma {
            background: #ffcc00 !important;
            color: #000 !important;
        }

        .z-semi {
            background: #34c759 !important;
            color: #fff !important;
        }

        .z-quote {
            background: #007aff !important;
            color: #fff !important;
        }

        .z-at {
            background: #fff !important;
            color: #000 !important;
            border: 1px solid #ddd !important;
        }

        /* --- SILENCE THE LINTER --- */
        #linter-silencer {
            display: none;
            visibility: hidden;
        }
    </style>
</head>
<body>

<div id="linter-silencer">
    <div class="word-node z-0 z-dot z-comma z-semi z-quote z-at open z-active"></div>
</div>

<div id="field"></div>

<div id="ui">
    <div id="topbar">
        <div id="logo">ZB</div>
        <div class="menu-wrapper">
            <button class="expand-btn" aria-label="Menu"
                    onclick="document.getElementById('dd').classList.toggle('active')">
                <span class="inner-circle"></span>
            </button>
            <div id="dd" class="dropdown">
                <a href="zb_runher.html">ZB RunHer</a>
                <a href="zb_askey.html">ZB AsKey ?</a>
                <a href="zb_voiceme.html">ZB VR??</a>
                <a href="zb_wc_anime.html">ZB Anime</a>
                <button onclick="document.getElementById('stored-panel').classList.add('open')">ZB SD</button>
            </div>
        </div>
    </div>
    <div style="flex:1;"></div>
    <div id="input-area">
        <input id="word-input" type="text" placeholder="Type a word..." autocomplete="off"
               aria-label="Type a word to launch">
        <button id="launch-btn" aria-label="Launch word">
            <svg width="24" height="24" viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
    <div id="marks">
        <div class="color-toggle" data-sign=" " style="background:#000;"></div>
        <div class="color-toggle" data-sign="." style="background:#ff3b30;"></div>
        <div class="color-toggle" data-sign="," style="background:#ffcc00;"></div>
        <div class="color-toggle" data-sign=";" style="background:#34c759;"></div>
        <div class="color-toggle" data-sign='"' style="background:#007aff;"></div>
        <div class="color-toggle active" data-sign="@" style="background:#fff; border:1px solid #ddd;"></div>
    </div>
</div>

<div id="stored-panel">
    <div style="display: flex; align-items: center; padding: 10px 15px;">
        <button onclick="document.getElementById('stored-panel').classList.remove('open')"
                style="padding: 10px; border: none; background: none; font-size: 24px; cursor: pointer;">✕
        </button>

        <button onclick="copyAllDictionary()" title="Copy All"
                style="background: none; border: none; cursor: pointer; display: flex; align-items: center; padding: 10px;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#007aff" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
        </button>

        <button onclick="clearDictionary()" title="Clear Dictionary"
                style="background: none; border: none; cursor: pointer; display: flex; align-items: center; padding: 10px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <polyline points="1 20 1 14 7 14"></polyline>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
        </button>
    </div>

    <div style="padding: 0 24px 10px; font-weight: 900; font-size: 24px;">Dictionary</div>
    <div id="stored-words"
         style="padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 10px;"></div>
</div>

<script>
    let nodes = [];
    let storedWords = JSON.parse(localStorage.getItem('zb_dictionary')) || [];

    const zbScheme = {
        ' ': {color: '#000000', text: '#ffffff', class: 'z-0'},
        '.': {color: '#ff3b30', text: '#ffffff', class: 'z-dot'},
        ',': {color: '#ffcc00', text: '#000000', class: 'z-comma'},
        ';': {color: '#34c759', text: '#ffffff', class: 'z-semi'},
        '"': {color: '#007aff', text: '#ffffff', class: 'z-quote'},
        '@': {color: '#ffffff', text: '#000000', class: 'z-at'}
    };

    let activeColor = zbScheme['@'].color;
    let activeZClass = zbScheme['@'].class;
    const input = document.getElementById('word-input');

    function wrapComplexText(text) {
        // Split by scheme characters, keeping them in the array, and remove empty results
        const tokens = text.split(/([ .,;"@])/g).filter(t => t !== "");

        return tokens.map((token, index) => {
            const theme = zbScheme[token];

            if (theme) {
                const isStart = index === 0;
                const isEnd = index === tokens.length - 1;

                // Only apply the <span> if the symbol is at the very beginning or very end
                if (isStart || isEnd) {
                    return `<span class="${theme.class}" style="padding: 0 4px; border-radius: 4px;">${token}</span>`;
                }
            }

            // If it's not a scheme character, OR it's in the middle, return raw text
            return token;
        }).join('');
    }

    function updateStoredUI() {
        const container = document.getElementById('stored-words');
        container.innerHTML = storedWords.map(item => `
            <div class="stored-item ${item.zClass || ''}" style="background:${item.color}; color:${item.textColor};">
                ${wrapComplexText(item.text)}
                <span onclick="copyToClipboard('${item.text.replace(/'/g, "\\'")}')"
                      style="position: absolute; right: 8px; cursor: pointer; opacity: 0.7; font-size: 16px;">📋</span>
            </div>
        `).join('');
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            // Success feedback
        }).catch(err => console.error(err));
    }

    function copyAllDictionary() {
        if (!storedWords.length) return;
        navigator.clipboard.writeText(storedWords.map(i => i.text).join('\n'));
    }

    function applyTheme(sign) {
        const theme = zbScheme[sign];
        if (!theme) return;
        activeColor = theme.color;
        activeZClass = theme.class;
        input.style.setProperty('--z-color', activeColor);
        input.classList.add('z-active');
        document.querySelectorAll('.color-toggle').forEach(el => el.classList.toggle('active', el.dataset.sign === sign));
    }

    input.oninput = () => {
        const val = input.value;
        if (!val) return input.classList.remove('z-active');
        let lastSign = null;
        for (let i = val.length - 1; i >= 0; i--) {
            if (zbScheme[val[i]]) {
                lastSign = val[i];
                break;
            }
        }
        if (lastSign) applyTheme(lastSign);
    };

    document.querySelectorAll('.color-toggle').forEach(t => t.onclick = () => applyTheme(t.dataset.sign));

    function handleSend() {
        const text = input.value.trim();
        if (!text) return;

        storedWords.push({
            text,
            color: activeColor,
            textColor: activeColor === '#ffffff' ? '#000' : '#fff',
            zClass: activeZClass
        });
        localStorage.setItem('zb_dictionary', JSON.stringify(storedWords));
        updateStoredUI();

        const el = document.createElement('div');
        el.className = `word-node ${activeZClass}`;
        el.innerHTML = wrapComplexText(text);
        const x = Math.random() * (window.innerWidth - 150);
        const y = Math.random() * (window.innerHeight - 300) + 100;
        document.getElementById('field').appendChild(el);

        const nodeObj = {el, x, y, dx: (Math.random() - 0.5) * 2, dy: (Math.random() - 0.5) * 2};
        nodes.push(nodeObj);

        setTimeout(() => {
            el.style.opacity = '0';
            nodes = nodes.filter(n => n !== nodeObj);
            setTimeout(() => el.remove(), 1000);
        }, 10000);

        input.value = '';
        input.classList.remove('z-active');
    }

    document.getElementById('launch-btn').onclick = handleSend;

    input.onkeydown = (e) => {
        if (e.key === 'Enter') {
            handleSend();
        }
    };

    function animate() {
        nodes.forEach(n => {
            n.x += n.dx;
            n.y += n.dy;
            if (n.x < 0 || n.x > window.innerWidth - 100) n.dx *= -1;
            if (n.y < 0 || n.y > window.innerHeight - 200) n.dy *= -1;
            // Rounding x/y prevents "Float px" warnings
            n.el.style.transform = `translate(${Math.round(n.x)}px, ${Math.round(n.y)}px)`;
        });
        requestAnimationFrame(animate);
    }

    function clearDictionary() {
        if (confirm("Clear all entries?")) {
            storedWords = [];
            localStorage.removeItem('zb_dictionary');
            updateStoredUI();
        }
    }

    updateStoredUI();
    animate();
</script>
</body>
</html>

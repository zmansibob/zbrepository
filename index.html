<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ZB - Floating Dictionary</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --mode-bg: #ffffff;
  --mode-text: #000000;
  --mode-border: rgba(0,0,0,0.1);
  --z-color: #ffffff; /* Dynamic variable for input border */
}

html, body {
  height: 100%;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  background: var(--mode-bg);
  color: var(--mode-text);
}

#field { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

.word-node {
  position: absolute;
  font-size: 16px;
  font-weight: 600;
  padding: 10px 20px;
  border-radius: 999px;
  white-space: nowrap;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
  will-change: transform;
  border: 1.5px solid rgba(255,255,255,0.2);
}

#ui {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex; flex-direction: column;
  pointer-events: none;
}
#ui > * { pointer-events: all; }

#topbar { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
#logo { font-weight: 900; font-size: 24px; letter-spacing: -1px; }

#center { flex: 1; pointer-events: none; }

#input-area { padding: 0 20px 20px; display: flex; gap: 10px; align-items: center; }
#word-input {
  flex: 1; background: rgba(0,0,0,0.06); border: 1.5px solid var(--mode-border);
  border-radius: 999px; padding: 14px 22px; font-size: 16px; outline: none;
  transition: border-left 0.2s;
}

/* Subtle indicator for the input field */
#word-input.z-active { border-left: 12px solid var(--z-color); }

#launch-btn {
  width: 52px; height: 52px; border-radius: 50%; background: #000;
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
#launch-btn svg { fill: #fff; }

#marks { padding: 0 20px 100px; display: flex; gap: 12px; justify-content: center; }

.color-toggle {
  width: 46px; height: 46px; border-radius: 50%;
  border: 3px solid transparent; cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
  box-shadow: 0 3px 6px rgba(0,0,0,0.15);
}
.color-toggle.active { border-color: #000; transform: scale(1.15); }

#stored-panel {
  position: fixed; inset: 0; z-index: 20; background: #fff;
  transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column; color: #000;
}
#stored-panel.open { transform: translateY(0); }
#stored-words { padding: 20px; display: flex; flex-wrap: wrap; gap: 10px; overflow-y: auto; flex: 1; }
.stored-item { padding: 10px 18px; border-radius: 999px; font-size: 14px; font-weight: 600; border: 1px solid rgba(0,0,0,0.1); }
.close-btn { padding: 25px; font-size: 32px; border: none; background: none; align-self: flex-end; cursor: pointer; }

.panel-actions {
  display: flex; gap: 10px; padding: 20px; border-top: 1px solid #eee;
}
.action-btn {
  flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer;
}
#export-btn { background: #007aff; color: #fff; }
#clear-storage { background: #ff3b30; color: #fff; }

/* Zmansi 0-5 Master Overrides */
.z-0 { background: #000000 !important; color: #ffffff !important; border-color: #333 !important; }
.z-dot { background: #ff3b30 !important; color: #ffffff !important; border-color: #700 !important; }
.z-comma { background: #ffcc00 !important; color: #000000 !important; border-color: #880 !important; }
.z-semi { background: #34c759 !important; color: #ffffff !important; border-color: #050 !important; }
.z-quote { background: #007aff !important; color: #ffffff !important; border-color: #004 !important; }
.z-at { background: #ffffff !important; color: #000000 !important; border-color: #ddd !important; }

</style>
</head>
<body>

<div id="field"></div>

<div id="ui">
  <div id="topbar" style="display: flex; align-items: center; justify-content: space-between;">
    <div id="logo">ZB</div>

    <div style="display: flex; gap: 10px; align-items: center;">
      <a href="zbaskkey.html" style="text-decoration: none; background: #000; color: #666; border: 1px solid #333; padding: 10px 20px; border-radius: 999px; font-weight: 600; font-size: 13px; transition: 0.3s;">
        zbaskkey
      </a>

      <button id="stored-toggle" style="background: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 999px; font-weight: 600; font-size: 13px; cursor: pointer;">
        Stored
      </button>
    </div>
  </div>
  <div id="center"></div>
  <div id="input-area">
    <input id="word-input" type="text" placeholder="Type a word..." autocomplete="off">
    <button id="launch-btn">
      <svg width="24" height="24" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div id="marks">
    <div class="color-toggle" data-sign="0" data-color="#000000" data-text="#ffffff" style="background:#000000;"></div>
    <div class="color-toggle" data-sign="." data-color="#ff3b30" data-text="#ffffff" style="background:#ff3b30;"></div>
    <div class="color-toggle" data-sign="," data-color="#ffcc00" data-text="#000000" style="background:#ffcc00;"></div>
    <div class="color-toggle" data-sign=";" data-color="#34c759" data-text="#ffffff" style="background:#34c759;"></div>
    <div class="color-toggle" data-sign='"' data-color="#007aff" data-text="#ffffff" style="background:#007aff;"></div>
    <div class="color-toggle active" data-sign="@" data-color="#ffffff" data-text="#000000" style="background:#ffffff;"></div>
  </div>
</div>

<div id="stored-panel">
  <button class="close-btn" id="stored-close">×</button>
  <div style="padding:0 24px; font-weight:900; font-size:24px; letter-spacing:-0.5px;">Dictionary</div>
  <div id="stored-words"></div>
  <div class="panel-actions">
    <button id="export-btn" class="action-btn">Export .TXT</button>
    <button id="clear-storage" class="action-btn">Clear All</button>
  </div>
</div>

<script>
let nodes = [];
let storedWords = JSON.parse(localStorage.getItem('zb_dictionary')) || [];
let activeColor = '#ffffff';
let activeTextColor = '#000000';
let activeZClass = 'z-at';

const input = document.getElementById('word-input');
const btn = document.getElementById('launch-btn');

const zScheme = {
  '0': { color: '#000000', text: '#ffffff', class: 'z-0' },
  '.': { color: '#ff3b30', text: '#ffffff', class: 'z-dot' },
  ',': { color: '#ffcc00', text: '#000000', class: 'z-comma' },
  ';': { color: '#34c759', text: '#ffffff', class: 'z-semi' },
  '"': { color: '#007aff', text: '#ffffff', class: 'z-quote' },
  '@': { color: '#ffffff', text: '#000000', class: 'z-at' }
};

updateStoredUI();

// 1. INPUT AUTO-COLOR LOGIC
input.oninput = () => {
  const firstChar = input.value.charAt(0);
  if (zScheme[firstChar]) {
    applyTheme(zScheme[firstChar]);
    // Sync the "Marks" toggles visually
    document.querySelectorAll('.color-toggle').forEach(el => {
      el.classList.toggle('active', el.dataset.sign === firstChar);
    });
  } else {
    input.classList.remove('z-active');
  }
};

function applyTheme(theme) {
  activeColor = theme.color;
  activeTextColor = theme.text;
  activeZClass = theme.class;
  input.style.setProperty('--z-color', activeColor);
  input.classList.add('z-active');
}

// 2. MANUAL TOGGLE LOGIC (Matches Python triggers)
document.querySelectorAll('.color-toggle').forEach(t => {
  t.onclick = () => {
    const sign = t.dataset.sign;
    applyTheme(zScheme[sign]);
    document.querySelectorAll('.color-toggle').forEach(el => el.classList.remove('active'));
    t.classList.add('active');
  };
});

function launchWord(text) {
  if (!text.trim()) return;

  // Use current active theme
  storedWords.push({ text, color: activeColor, textColor: activeTextColor, zClass: activeZClass });
  localStorage.setItem('zb_dictionary', JSON.stringify(storedWords));
  updateStoredUI();

  const el = document.createElement('div');
  el.className = `word-node ${activeZClass}`;
  el.textContent = text;

  const x = Math.random() * (window.innerWidth - 120) + 60;
  const y = Math.random() * (window.innerHeight - 300) + 150;
  document.getElementById('field').appendChild(el);

  const nodeObj = { el, x, y, dx: (Math.random()-0.5)*1.8, dy: (Math.random()-0.5)*1.8 };
  nodes.push(nodeObj);

  setTimeout(() => {
    el.style.transform += ' scale(2)';
    el.style.opacity = '0';
    nodes = nodes.filter(n => n !== nodeObj);
    setTimeout(() => el.remove(), 2000);
  }, 10000);
}

function updateStoredUI() {
  const container = document.getElementById('stored-words');
  container.innerHTML = storedWords.map(item => `
    <div class="stored-item ${item.zClass || ''}" style="background:${item.color}; color:${item.textColor};">
      ${item.text}
    </div>
  `).join('');
}

// EXPORT & UI
document.getElementById('export-btn').onclick = () => {
  if (storedWords.length === 0) return alert("Nothing to export!");
  const blob = new Blob([storedWords.map(i => `${i.text}`).join('\n')], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'zb-dictionary.txt';
  a.click();
};

document.getElementById('clear-storage').onclick = () => {
  if(confirm("Clear everything?")) {
    storedWords = [];
    localStorage.removeItem('zb_dictionary');
    updateStoredUI();
  }
};

function animate() {
  nodes.forEach(n => {
    n.x += n.dx; n.y += n.dy;
    if (n.x < 0 || n.x > window.innerWidth - 100) n.dx *= -1;
    if (n.y < 0 || n.y > window.innerHeight - 200) n.dy *= -1;
    n.el.style.transform = `translate(${n.x}px, ${n.y}px)`;
  });
  requestAnimationFrame(animate);
}

function handleSend() {
    launchWord(input.value);
    input.value = '';
    // Do not reset the color immediately so the user can keep typing in the same theme
}

btn.onclick = handleSend;
input.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };

document.getElementById('stored-toggle').onclick = () => document.getElementById('stored-panel').classList.add('open');
document.getElementById('stored-close').onclick = () => document.getElementById('stored-panel').classList.remove('open');

animate();
</script>
</body>
</html>
